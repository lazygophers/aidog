name: Release

# 触发：根目录 .version 变更（版本唯一可信源）→ 多平台构建 + 签名 + 发布 GitHub Release + 生成 updater latest.json。
on:
  push:
    branches: [master]
    paths:
      - ".version"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # macOS Universal（arm64 + x64 合一安装包）
            args: "--target universal-apple-darwin"
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest # x64
            args: ""
            target: ""
    runs-on: ${{ matrix.platform }}
    # 强制 yarn(berry) 缓存落到项目本地 .yarn/cache：跨平台路径确定，供下方 actions/cache 缓存。
    env:
      YARN_ENABLE_GLOBAL_CACHE: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      # yarn@4(berry) 依赖缓存：setup-node 的 cache:yarn 在 corepack 前跑会读错目录，故用显式 cache。
      # restore/save 分离：默认 actions/cache 在 job 失败时跳过 save，拆开后 save 步带 if:always() 保证失败也缓存。
      - name: Restore yarn cache
        uses: actions/cache/restore@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-on-failure: true # job 失败也保存 Rust 缓存（编译产物可被下次复用）

      - name: Install frontend deps
        run: yarn install --immutable

      - name: Verify version sync (.version 单一源)
        run: node scripts/sync-version.mjs --check

      # 内联读版本号（曾是独立 read-version job，为一行 echo 起整台 ubuntu runner，浪费一次 spin-up）。
      - name: Read version (.version 单一源)
        id: v
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < .version)" >> "$GITHUB_OUTPUT"

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.v.outputs.version }}
          releaseName: AiDog v${{ steps.v.outputs.version }}
          releaseBody: |
            ## 🐕 AiDog — 统一管理你的 AI API 网关

            本地桌面应用 · 无需上云 · 50+ 平台一键聚合 · 智能路由 · 用量统计

            ### 📦 下载

            | 平台 | 安装包 |
            | --- | --- |
            | macOS（Apple Silicon + Intel） | `*_universal.dmg` |
            | Windows x64 | `*_x64-setup.exe`（推荐）/ `*_x64_en-US.msi` |

            ### 🍎 macOS 首次打开

            应用未经 Apple 公证，若提示「已损坏」或「无法验证开发者」，执行一次后即可打开：

            ```bash
            xattr -dr com.apple.quarantine /Applications/AiDog.app
            ```

            ### 🔄 自动更新

            客户端「关于」页可检查并一键更新；`.sig` / `latest.json` 为更新签名文件，无需手动下载。

            ### 📖 文档

            https://lazygophers.github.io/aidog/zh/
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # 保存 yarn 缓存：if:always() 保证 build 失败也存（与 restore 同 key；命中精确 key 时 actions/cache 自动跳过写入）。
      - name: Save yarn cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
